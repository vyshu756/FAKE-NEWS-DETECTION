<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Fake News Detector</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        
        .header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
            animation: fadeIn 0.8s ease-in;
        }
        
        .header h1 {
            font-size: 3em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }
        
        .header p {
            font-size: 1.3em;
            opacity: 0.95;
        }
        
        .main-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            animation: slideUp 0.8s ease-out;
        }
        
        .card {
            background: white;
            border-radius: 20px;
            padding: 35px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        
        .card h2 {
            color: #667eea;
            margin-bottom: 25px;
            font-size: 1.8em;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .input-section textarea {
            width: 100%;
            height: 300px;
            padding: 20px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 1em;
            resize: vertical;
            font-family: inherit;
            transition: border-color 0.3s;
        }
        
        .input-section textarea:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .button-group {
            display: flex;
            gap: 15px;
            margin-top: 20px;
        }
        
        .btn {
            flex: 1;
            padding: 18px;
            border: none;
            border-radius: 12px;
            font-size: 1.1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
        }
        
        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        
        .btn-secondary {
            background: #f5f5f5;
            color: #666;
        }
        
        .btn-secondary:hover {
            background: #e0e0e0;
        }
        
        .result-section {
            min-height: 400px;
        }
        
        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 400px;
            color: #999;
        }
        
        .empty-state svg {
            width: 100px;
            height: 100px;
            margin-bottom: 20px;
            opacity: 0.3;
        }
        
        .result-content {
            animation: fadeIn 0.5s ease-in;
        }
        
        .prediction-badge {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            padding: 20px 35px;
            border-radius: 50px;
            font-size: 1.5em;
            font-weight: bold;
            margin: 20px 0;
        }
        
        .badge-real {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            color: white;
        }
        
        .badge-fake {
            background: linear-gradient(135deg, #eb3349 0%, #f45c43 100%);
            color: white;
        }
        
        .metrics {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin: 25px 0;
        }
        
        .metric-card {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 12px;
            border-left: 4px solid #667eea;
        }
        
        .metric-label {
            font-size: 0.9em;
            color: #666;
            margin-bottom: 8px;
        }
        
        .metric-value {
            font-size: 2em;
            font-weight: bold;
            color: #667eea;
        }
        
        .progress-bar {
            width: 100%;
            height: 12px;
            background: #e0e0e0;
            border-radius: 10px;
            overflow: hidden;
            margin-top: 10px;
        }
        
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            transition: width 1s ease-out;
        }
        
        .keywords {
            margin-top: 25px;
        }
        
        .keywords h3 {
            color: #495057;
            margin-bottom: 15px;
            font-size: 1.1em;
        }
        
        .keyword-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }
        
        .keyword-tag {
            padding: 10px 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 25px;
            font-size: 0.95em;
            font-weight: 500;
        }
        
        .interpretation {
            background: #fff3cd;
            border-left: 4px solid #ffc107;
            padding: 20px;
            border-radius: 8px;
            margin-top: 25px;
        }
        
        .interpretation h4 {
            color: #856404;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .interpretation p {
            color: #856404;
            line-height: 1.6;
        }
        
        .loading {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 400px;
        }
        
        .spinner {
            width: 60px;
            height: 60px;
            border: 5px solid #f3f3f3;
            border-top: 5px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        .loading-text {
            margin-top: 20px;
            color: #666;
            font-size: 1.1em;
        }
        
        .error-message {
            background: #f8d7da;
            border: 2px solid #f5c6cb;
            color: #721c24;
            padding: 20px;
            border-radius: 12px;
            margin: 20px 0;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        @media (max-width: 968px) {
            .main-content {
                grid-template-columns: 1fr;
            }
            
            .header h1 {
                font-size: 2em;
            }
            
            .metrics {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎯 AI Fake News Detector</h1>
            <p>Analyze news articles using advanced AI technology</p>
        </div>
        
        <div class="main-content">
            <!-- Input Section -->
            <div class="card input-section">
                <h2>
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                        <polyline points="14 2 14 8 20 8"></polyline>
                        <line x1="16" y1="13" x2="8" y2="13"></line>
                        <line x1="16" y1="17" x2="8" y2="17"></line>
                        <polyline points="10 9 9 9 8 9"></polyline>
                    </svg>
                    Input Article
                </h2>
                <textarea 
                    id="newsInput" 
                    placeholder="Paste your news article here...&#10;&#10;Example:&#10;Scientists at NASA announced the discovery of water on Mars. The finding was confirmed by multiple independent research teams using data from the Mars Reconnaissance Orbiter."
                ></textarea>
                <div class="button-group">
                    <button class="btn btn-primary" id="analyzeBtn" onclick="analyzeNews()">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="11" cy="11" r="8"></circle>
                            <path d="m21 21-4.35-4.35"></path>
                        </svg>
                        Analyze Article
                    </button>
                    <button class="btn btn-secondary" onclick="clearInput()">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <polyline points="3 6 5 6 21 6"></polyline>
                            <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                        </svg>
                        Clear
                    </button>
                </div>
            </div>
            
            <!-- Result Section -->
            <div class="card result-section">
                <h2>
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline>
                    </svg>
                    Analysis Result
                </h2>
                <div id="resultContainer">
                    <div class="empty-state">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                            <polyline points="14 2 14 8 20 8"></polyline>
                        </svg>
                        <p>Results will appear here after analysis</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:8000';
        
        async function analyzeNews() {
            const input = document.getElementById('newsInput').value.trim();
            const resultContainer = document.getElementById('resultContainer');
            const analyzeBtn = document.getElementById('analyzeBtn');
            
            if (!input) {
                alert('Please enter some text to analyze');
                return;
            }
            
            // Show loading state
            analyzeBtn.disabled = true;
            resultContainer.innerHTML = `
                <div class="loading">
                    <div class="spinner"></div>
                    <div class="loading-text">Analyzing with AI...</div>
                </div>
            `;
            
            try {
                const response = await fetch(`${API_URL}/predict`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ text: input })
                });
                
                if (!response.ok) {
                    throw new Error('Failed to analyze text');
                }
                
                const data = await response.json();
                displayResult(data);
            } catch (error) {
                resultContainer.innerHTML = `
                    <div class="error-message">
                        <h3 style="margin-bottom: 10px;">⚠️ Error</h3>
                        <p><strong>Could not connect to the API.</strong></p>
                        <p style="margin-top: 10px;">Make sure the backend server is running:</p>
                        <code style="display: block; background: white; padding: 10px; border-radius: 5px; margin-top: 10px;">python main.py</code>
                        <p style="margin-top: 10px; font-size: 0.9em;">Server should be running at: ${API_URL}</p>
                    </div>
                `;
            } finally {
                analyzeBtn.disabled = false;
            }
        }
        
        function displayResult(data) {
            const isFake = data.prediction === 'Fake News';
            const confidencePercent = (data.confidence_score * 100).toFixed(2);
            
            const resultHTML = `
                <div class="result-content">
                    <div style="text-align: center;">
                        <div class="prediction-badge ${isFake ? 'badge-fake' : 'badge-real'}">
                            ${isFake ? '⚠️' : '✅'} ${data.prediction}
                        </div>
                    </div>
                    
                    <div class="metrics">
                        <div class="metric-card">
                            <div class="metric-label">Confidence Score</div>
                            <div class="metric-value">${confidencePercent}%</div>
                            <div class="progress-bar">
                                <div class="progress-fill" style="width: ${confidencePercent}%"></div>
                            </div>
                        </div>
                        <div class="metric-card">
                            <div class="metric-label">Credibility Score</div>
                            <div class="metric-value">${data.credibility_score}/100</div>
                            <div class="progress-bar">
                                <div class="progress-fill" style="width: ${data.credibility_score}%"></div>
                            </div>
                        </div>
                    </div>
                    
                    ${data.important_keywords && data.important_keywords.length > 0 ? `
                        <div class="keywords">
                            <h3>🔑 Key Influential Words</h3>
                            <div class="keyword-tags">
                                ${data.important_keywords.map(keyword => 
                                    `<span class="keyword-tag">${keyword}</span>`
                                ).join('')}
                            </div>
                        </div>
                    ` : ''}
                    
                    <div class="interpretation">
                        <h4>
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <circle cx="12" cy="12" r="10"></circle>
                                <path d="M12 16v-4"></path>
                                <path d="M12 8h.01"></path>
                            </svg>
                            Interpretation
                        </h4>
                        <p>${isFake 
                            ? 'Our AI model has detected patterns commonly associated with fake news. Please verify this information through multiple trusted sources before sharing.'
                            : 'The article appears to be legitimate based on our AI analysis. However, always cross-reference important information with multiple reliable sources.'
                        }</p>
                    </div>
                </div>
            `;
            
            document.getElementById('resultContainer').innerHTML = resultHTML;
        }
        
        function clearInput() {
            document.getElementById('newsInput').value = '';
            document.getElementById('resultContainer').innerHTML = `
                <div class="empty-state">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                        <polyline points="14 2 14 8 20 8"></polyline>
                    </svg>
                    <p>Results will appear here after analysis</p>
                </div>
            `;
        }
        
        // Allow Enter key to submit (with Ctrl/Cmd)
        document.getElementById('newsInput').addEventListener('keydown', function(e) {
            if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
                analyzeNews();
            }
        });
    </script>
</body>
</html>
