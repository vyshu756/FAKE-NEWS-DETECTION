services:
  - type: web
    name: fake-news-detector-api
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ALLOWED_ORIGINS
        value: https://your-frontend-url.com
      - key: PYTHON_VERSION
        value: 3.10.0
    healthCheckPath: /health
